services:
  db:
    image: postgres:16-alpine
    container_name: darts-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-darts_tournament}
      POSTGRES_USER: ${POSTGRES_USER:-darts}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-darts_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-darts}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - darts-network

  redis:
    image: redis:7-alpine
    container_name: darts-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - darts-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: darts-backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-darts}:${POSTGRES_PASSWORD:-darts_secret}@db:5432/${POSTGRES_DB:-darts_tournament}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-django-insecure-change-me-in-production}
      DEBUG: ${DEBUG:-True}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: >
      sh -c "
        python manage.py migrate &&
        gunicorn backend.config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 120 --reload
      "
    networks:
      - darts-network

  celery:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: darts-celery
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-darts}:${POSTGRES_PASSWORD:-darts_secret}@db:5432/${POSTGRES_DB:-darts_tournament}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-django-insecure-change-me-in-production}
      DEBUG: ${DEBUG:-True}
    depends_on:
      - redis
      - db
    volumes:
      - ./backend:/app
    command: celery -A backend.config.celery worker -l info
    networks:
      - darts-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: darts-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    networks:
      - darts-network

volumes:
  postgres_data:

networks:
  darts-network:
    driver: bridge
