services:
  db:
    image: postgres:16-alpine
    container_name: darts-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-darts_tournament}
      POSTGRES_USER: ${POSTGRES_USER:-darts}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-darts_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-darts}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - darts-network

  redis:
    image: redis:7-alpine
    container_name: darts-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - darts-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: darts-backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-darts}:${POSTGRES_PASSWORD:-darts_secret}@db:5432/${POSTGRES_DB:-darts_tournament}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-django-insecure-change-me-in-production}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - static_files:/app/staticfiles
    command: >
      sh -c "
        ln -sfn /app /app/backend &&
        python manage.py migrate &&
        gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 120
      "
    networks:
      - darts-network

  celery:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: darts-celery
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-darts}:${POSTGRES_PASSWORD:-darts_secret}@db:5432/${POSTGRES_DB:-darts_tournament}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-django-insecure-change-me-in-production}
      DEBUG: ${DEBUG:-False}
    depends_on:
      - redis
      - db
    volumes:
      - ./backend:/app
    command: sh -c "ln -sfn /app /app/backend && celery -A backend.config.celery worker -l info"
    networks:
      - darts-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: darts-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:8000}
    networks:
      - darts-network

  # Development profile - hot reload frontend
  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: darts-frontend-dev
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    networks:
      - darts-network
    profiles:
      - dev

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: darts-nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
    volumes:
      - static_files:/app/staticfiles:ro
    networks:
      - darts-network

volumes:
  postgres_data:
  static_files:

networks:
  darts-network:
    driver: bridge